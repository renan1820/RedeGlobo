query ContentDetailQuery($id: ID!) {
  character(id: $id) {
    id
    name
    status
    species
    type
    gender
    image
    origin {
      id
      name
      type
      dimension
    }
    location {
      id
      name
      type
    }
    episode {
      id
      name
      episode
      air_date
      created
    }
    created
  }
}
