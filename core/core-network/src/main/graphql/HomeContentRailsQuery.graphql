query HomeContentRailsQuery($page: Int) {
  characters(page: $page) {
    info {
      count
      pages
      next
      prev
    }
    results {
      id
      name
      status
      species
      image
      origin {
        name
      }
      episode {
        id
        name
        episode
        air_date
      }
    }
  }
}
