name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Build Mobile Debug APK
        run: ./gradlew assembleMobileDebug --stacktrace

      - name: Build TV Debug APK
        run: ./gradlew assembleTvDebug --stacktrace

      - name: Run Unit Tests
        run: ./gradlew testMobileDebugUnitTest --stacktrace

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/build/test-results/**/*.xml'

      - name: Upload Mobile APK
        uses: actions/upload-artifact@v4
        with:
          name: app-mobile-debug
          path: app/build/outputs/apk/mobile/debug/app-mobile-debug.apk

      - name: Upload TV APK
        uses: actions/upload-artifact@v4
        with:
          name: app-tv-debug
          path: app/build/outputs/apk/tv/debug/app-tv-debug.apk
